<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Nebula Notes - Glassmorphic Notepad</title>
    <style>
        /* --- Global Styles & Dark Background Setup --- */
        :root {
            --primary-bg: #121218; /* Very dark background, deep space feel */
            --card-bg: rgba(30, 30, 50, 0.6); /* Semi-transparent blue/purple for glass effect */
            --border-color: rgba(255, 255, 255, 0.1);
            --text-light: #e0e0ff;
            --accent-color: #8a2be2; /* Blue Violet - nice pop color */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #0a0d19 100%); /* Subtle gradient background */
            color: var(--text-light);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 40px;
            color: var(--text-light);
            text-shadow: 0 4px 15px rgba(138, 43, 226, 0.5);
        }

        /* --- Main Container Layout (Flexbox for Notes) --- */
        #app-container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            gap: 30px;
            margin-top: 20px;
        }

        /* Left Panel (Input Area) */
        #input-panel {
            flex: 1;
            min-width: 350px;
            padding: 30px;
        }

        /* Right Panel (Saved Notes Feed) */
        #notes-feed {
            flex: 2;
            max-height: 80vh; /* Limit height for scrolling */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Glass Effect Styling (The Magic) --- */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(15px); /* Key ingredient for glass look */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); /* Soft shadow for depth */
            border: 1px solid var(--border-color);
            padding: 30px;
        }

        /* --- Textarea Styling --- */
        #note-content {
            width: 100%;
            height: 200px;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3); /* Slightly darker input area */
            color: var(--text-light);
            resize: none;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #note-content:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(138, 43, 226, 0.5);
        }

        /* --- Button Styling --- */
        #save-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s, transform 0.1s;
        }

        #save-btn:hover {
            background-color: #a34cd5; /* Slightly brighter on hover */
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.5);
        }

        /* --- Saved Note Card Styling --- */
        .note-card {
            background: rgba(35, 35, 60, 0.7); /* Slightly different background for distinction */
            backdrop-filter: blur(12px);
            border-radius: 15px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-left: 4px solid var(--accent-color); /* Visual accent */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .note-card:hover {
             transform: translateY(-5px);
             box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        }

        .note-card p {
            white-space: pre-wrap; /* Important for preserving line breaks */
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.6;
            max-height: 150px; /* Limit size while allowing scrolling content */
            overflow-y: auto;
        }

        .note-meta {
            display: block;
            font-size: 0.8em;
            color: #aaa;
            text-align: right;
            margin-top: 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 8px;
        }

        /* Utility for the 'Delete' button */
        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            float: right;
            font-size: 1.2em;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .delete-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }


        @media (max-width: 800px) {
            #app-container {
                flex-direction: column;
                align-items: center;
            }

            #input-panel, #notes-feed {
                min-width: 90%;
                max-width: 600px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1>🌌 Nebula Notes</h1>
    <p>Capture your thoughts in this dark, glassmorphic interface.</p>

    <div id="app-container">
        <!-- INPUT PANEL (Left Side) -->
        <div class="glass-panel" id="input-panel">
            <h2>New Note</h2>
            <textarea id="note-content" placeholder="Start writing your brilliant ideas here..."></textarea>
            <button id="save-btn">✨ Save Note</button>
            <p style="margin-top: 15px; font-size: 0.9em; color: #aaa;">*Notes are automatically saved to your browser.</p>
        </div>

        <!-- NOTES FEED (Right Side) -->
        <div id="notes-feed">
            <h2>Your Thoughts</h2>
            <!-- Notes will be inserted here by JavaScript -->
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const noteContent = document.getElementById('note-content');
            const saveBtn = document.getElementById('save-btn');
            const notesFeed = document.getElementById('notes-feed');

            // --- 1. Load Notes from Local Storage ---
            function loadNotes() {
                const notes = JSON.parse(localStorage.getItem('nebulaNotes')) || [];
                notesFeed.innerHTML = '<h2>Your Thoughts</h2>'; // Clear existing content
                if (notes.length === 0) {
                    notesFeed.innerHTML += '<p style="color: #aaa;">No notes yet! Write something in the panel to get started.</p>';
                    return;
                }
                
                // Display notes in reverse chronological order (newest first)
                [...notes].reverse().forEach(noteData => {
                    displayNote(noteData);
                });
            }

            // --- 2. Save Note Functionality ---
            function saveNote() {
                const content = noteContent.value.trim();

                if (content === "") {
                    alert("Please write something before saving!");
                    return;
                }

                const newNote = {
                    id: Date.now(), // Unique ID
                    content: content,
                    timestamp: new Date().toLocaleString()
                };

                // Update Local Storage
                let notes = JSON.parse(localStorage.getItem('nebulaNotes')) || [];
                notes.push(newNote);
                localStorage.setItem('nebulaNotes', JSON.stringify([...notes]));
                
                // Clear input and refresh display
                noteContent.value = '';
                displayNote(newNote);

                // Optional: Give visual feedback
                saveBtn.textContent = '💾 Saved!';
                setTimeout(() => { saveBtn.textContent = '✨ Save Note'; }, 500);
            }

            // --- 3. Display Note Functionality (Creates the DOM element) ---
            function displayNote(noteData) {
                const noteCard = document.createElement('div');
                noteCard.className = 'glass-panel note-card';
                
                // Inner HTML structure for the card
                noteCard.innerHTML = `
                    <button class="delete-btn" data-id="${noteData.id}">&times;</button>
                    <p>${noteData.content}</p>
                    <span class="note-meta">Saved on: ${noteData.timestamp}</span>
                `;

                notesFeed.appendChild(noteCard);
            }

            // --- 4. Event Listeners ---

            // Save Button Click Handler
            saveBtn.addEventListener('click', saveNote);

            // Enter Key Submission (Better UX)
            noteContent.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); // Prevents adding extra line breaks
                    saveNote();
                }
            });

            // Delegation for Delete Buttons (Must be added after DOM load)
            notesFeed.addEventListener('click', (e) => {
                if (e.target && e.target.classList.contains('delete-btn')) {
                    const noteIdToDelete = parseInt(e.target.dataset.id);

                    if (confirm("Are you sure you want to delete this note?")) {
                        let notes = JSON.parse(localStorage.getItem('nebulaNotes')) || [];
                        
                        // Filter out the deleted note
                        notes = notes.filter(note => note.id !== noteIdToDelete);
                        
                        // Update storage and UI
                        localStorage.setItem('nebulaNotes', JSON.stringify(notes));

                        // Remove from DOM
                        e.target.closest('.note-card').remove();
                    }
                }
            });


            // --- Initialize Application ---
            loadNotes();
        });
    </script>

</body>
</html>
