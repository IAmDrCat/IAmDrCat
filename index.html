<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Notes</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --accent: #7c4dff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Animated Background Blobs to make the glass effect visible */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #7c4dff 0%, #448aff 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            right: -100px;
            top: -100px;
            background: #ff448a;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .container {
            width: 100%;
            max-width: 900px;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-monkey-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* Glass Button */
        .btn-add {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-add:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(124, 77, 255, 0.4);
        }

        /* Notes Grid */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Glass Note Card */
        .note-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 24px;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        .note-card h3 {
            margin-bottom: 12px;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .note-card p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-dim);
            white-space: pre-wrap;
        }

        .note-card .date {
            margin-top: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            display: block;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .note-card:hover .delete-btn {
            opacity: 1;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: #1a1a1e;
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal h2 { margin-bottom: 20px; }

        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            margin-bottom: 20px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-dim);
            border: none;
            padding: 10px 25px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header>
            <h1>Glass Notes</h1>
            <button class="btn-add" onclick="openModal()">+ New Note</button>
        </to>
        <div class="notes-grid" id="notesGrid">
            <!-- Notes will appear here -->
        </div>
    </div>

    <!-- Modal for creating notes -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Create Note</h2>
            <input typeype="text" id="noteTitle" placeholder="Title">
            <textarea id="noteContent" rows="5" placeholder="Write your thoughts..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveNote()">Save Note</button>
            </div>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('glass_notes')) || [];

        const modalOverlay = document.getElementById('modalOverlay');
        const notesGrid = document.getElementById('notesGrid');
        const noteTitle = document.getElementById('noteTitle');
        const noteContent = document.getElementById('noteContent');

        function openModal() {
            modalOverlay.style.display = 'flex';
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
            noteTitle.value = '';
            noteContent.value = '';
        }

        function saveNote() {
            const title = noteTitle.value;
            const content = noteContent.value;

            if (!title || !content) {
                alert("Please fill in both fields");
                return;
            }

            const newNote = {
                id: Date.now(),
                title: title,
                content: content,
                date: new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
            };

            notes.unshift(newNote);
            localStorage.setItem('glass_notes', JSON.stringify(notes));
            renderNotes();
            closeModal();
        }

        function deleteNote(id) {
            notes = notes.filter(note => note.id !== id);
            localStorage.setItem('glass_notes', JSON.stringify(notes));
            renderNotes();
        }

        function renderNotes() {
            notesGrid.innerHTML = '';

            if (notes.length === 0) {
                notesGrid.innerHTML = `<p style="color: var(--text-dim); grid-column: 1/-1; text-align: center; margin-top: 50px;">No notes found. Start by adding one!</p>`;
                return;
            }

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteNote(${note.id})">✕</button>
                    <h3>${note.title}</h3>
                    <p>${note.content}</p>
                    <span class="date">${note.date}</span>
                `;
                notesGrid.appendChild(card);
            });
        }

        // Initial Render
        renderNotes();

        // Close modal if clicking outside the box
        window.onclick = function(event) {
            if (event.target == modalOverlay) closeModal();
        }
    </script>
</body>
</html>
