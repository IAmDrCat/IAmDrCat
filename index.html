<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Glass Notes</title>
         <style>
        /* --- CSS DESIGN (The "Glass" Magic) --- */
        :root {
            --bg-color: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #a855f7; /* Soft Purple */
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            /* This creates the colorful blobs behind the glass */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* --- The Glass Input Card --- */
        .input-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        textarea {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            min-height: 80px;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-actions {
            display: flex;
            justify-content: flex-end;
        }

        button#add-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button#add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
        }

        /* --- The Notes Grid --- */
        #notes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .note-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.4s ease forwards;
            transition: transform 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .note-content {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            white-space: pre-wrap; /* Preserves line breaks */
            word-wrap: break-word;
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: rgba(239, 6망, 68, 0.2);
            color: #ef4444;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Midnight</h1>
            <p>Your thoughts, etched in glass.</p>
        </header>

        <!-- Input Section -->
        <div class="input-card">
            <textarea id="noteInput" placeholder="Write a new thought..."></textarea>
            <div class="input-actions">
                <button id="add-btn">Save Note</button>
            </div>
        </div>

        <!-- Notes Display Section -->
        <div id="notes-grid">
            <!-- Notes will appear here -->
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC (The "Brain") --- */
        const noteInput = document.getElementById('noteInput');
        const addBtn = document.getElementById('add-btn');
        const notesGrid = document.getElementById('notes-grid');

        // Load notes from localStorage on startup
        let notes = JSON.parse(localStorage.getItem('midnight_notes')) || [];

        function saveToLocalStorage() {
            localStorage.setItem('midnight_notes', JSON.stringify(notes));
        }

        function renderNotes() {
            notesGrid.innerHTML = '';
            
            if (notes.length === 0) {
                notesGrid.innerHTML = `<p style="text-align: center; color: var(--text-dim); margin-top: 2rem;">No notes yet. Start writing.</p>`;
                return;
            }

            // Render from newest to oldest
            [...notes].reverse().forEach((note, index) => {
                const actualIndex = notes.length - 1 - index; // Get original array index
                
                const card = document.createElement('div');
                card.className = 'note-card';
                
                card.innerHTML = `
                    <div class="note-content">${escapeHTML(note.text)}</div>
                    <div class="note-footer">
                        <span>${note.date}</span>
                        <button class="delete-btn" onclick="deleteNote(${actualIndex})">Delete</button>
                    </div>
                `;
                notesGrid.appendChild(card);
            });
        }

        function addNote() {
            const text = noteInput.value.trim();
            if (!text) return;

            const newNote = {
                text: text,
                date: new Date().toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };

            notes.push(newNote);
            saveToLocalStorage();
            renderNotes();
            noteInput.value = ''; // Clear input
        }

        function deleteNote(index) {
            notes.splice(index, 1);
            saveToLocalStorage();
            renderNotes();
        }

        // Helper to prevent XSS (Security)
        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, function(m) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                }[m];
            });
        }

        // Event Listeners
        addBtn.addEventListener('click', addNote);
        
        noteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Prevent newline on Enter
                addNote();
            }
        });

        // Initial Render
        renderNotes();
    </script>
</body>
</html>
