<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Media Converter | IAmDrCat</title>
    <meta name="description"
        content="Convert video, audio, and images to any format instantly. Free, fast, and secure online media converter powered by IAmDrCat." />
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f3460);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(139, 92, 246, 0.5);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* Navbar */
        header {
            position: relative;
            z-index: 10;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8b5cf6;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #cbd5e1;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* Drop Zone */
        .drop-zone {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 60px 40px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .drop-zone.dragover {
            background: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6;
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        .icon-upload {
            width: 64px;
            height: 64px;
            color: #8b5cf6;
            margin-bottom: 20px;
        }

        .drop-text {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .drop-subtext {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Options Panel */
        .options-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            display: none;
            animation: slideUp 0.5s ease;
            text-align: left;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .file-icon {
            width: 48px;
            height: 48px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b5cf6;
        }

        .file-details h3 {
            font-size: 1rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .file-details span {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .format-selection {
            margin-bottom: 25px;
        }

        .format-selection label {
            display: block;
            margin-bottom: 10px;
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .format-option {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .format-option:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6;
            color: #fff;
        }

        .format-option.selected {
            background: #8b5cf6;
            border-color: #8b5cf6;
            color: #fff;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .btn-convert {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ec4899, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.5);
        }

        .btn-convert:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress */
        .progress-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-text {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="particles"></div>

    <header>
        <nav>
            <div class="logo">
                <a href="/">
                    IAmDrCat
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="downloader.html">Downloader</a></li>
                <li><a href="converter.html" class="active">Converter</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Universal Converter</h1>
        <p class="subtitle">Transform any file into anything. Powered by FFmpeg.</p>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" />
            <svg class="icon-upload" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <div class="drop-text">Drag & Drop your file here</div>
            <div class="drop-subtext">or click to browse</div>
        </div>

        <div class="options-panel" id="optionsPanel">
            <!-- Progress Overlay -->
            <div class="progress-overlay" id="progressOverlay">
                <div class="spinner"></div>
                <div class="status-text" id="statusText">Converting...</div>
            </div>

            <div class="file-info">
                <div class="file-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div class="file-details">
                    <h3 id="fileName">video.mp4</h3>
                    <span id="fileSize">15.4 MB</span>
                </div>
            </div>

            <div class="format-selection">
                <label>Convert To:</label>
                <div class="format-grid" id="formatGrid">
                    <!-- Options injected via JS -->
                </div>
            </div>

            <button class="btn-convert" onclick="startConversion()">Convert Now</button>
        </div>
    </main>

    <script>
        // Particles
        const container = document.querySelector('.particles');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 5 + 's';
            p.style.animationDelay = Math.random() * 20 + 's';
            container.appendChild(p);
        }

        // Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const optionsPanel = document.getElementById('optionsPanel');
        const formatGrid = document.getElementById('formatGrid');

        let selectedFile = null;
        let selectedFormat = null;

        // Config
        const FORMATS = {
            'video': ['MP4', 'MKV', 'AVI', 'MOV', 'WEBM', 'MP3', 'GIF'],
            'audio': ['MP3', 'WAV', 'FLAC', 'AAC', 'M4A', 'OGG'],
            'image': ['JPG', 'PNG', 'WEBP', 'BMP', 'TIFF']
        };

        const API_BASE_URL = 'https://api.iamdrcat.com';

        // Drag Handling
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file) return;
            selectedFile = file;

            // UI Updates
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
            optionsPanel.style.display = 'block';
            dropZone.style.display = 'none';

            // Determine likely type
            let type = 'video'; // Default
            if (file.type.startsWith('audio/')) type = 'audio';
            if (file.type.startsWith('image/')) type = 'image';

            renderFormats(type);
        }

        function renderFormats(type) {
            formatGrid.innerHTML = '';
            const opts = FORMATS[type] || FORMATS['video'];

            opts.forEach(fmt => {
                const el = document.createElement('div');
                el.className = 'format-option';
                el.textContent = fmt;
                el.onclick = () => selectFormat(fmt, el);
                formatGrid.appendChild(el);
            });

            // Auto select first
            if (opts.length > 0) {
                // Find one that isn't the current extension if possible
                const ext = selectedFile.name.split('.').pop().toUpperCase();
                const diff = opts.find(f => f !== ext);
                selectFormat(diff || opts[0], null);
            }
        }

        function selectFormat(fmt, el) {
            selectedFormat = fmt;
            document.querySelectorAll('.format-option').forEach(e => e.classList.remove('selected'));

            if (el) {
                el.classList.add('selected');
            } else {
                // If finding by text (auto-select)
                Array.from(document.querySelectorAll('.format-option'))
                    .find(e => e.textContent === fmt)
                    ?.classList.add('selected');
            }
        }

        async function startConversion() {
            if (!selectedFile || !selectedFormat) return;

            const overlay = document.getElementById('progressOverlay');
            const statusText = document.getElementById('statusText');
            overlay.style.display = 'flex';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('format', selectedFormat.toLowerCase());

            try {
                statusText.textContent = "Uploading & Converting...";

                const response = await fetch(`${API_BASE_URL}/api/convert`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Conversion failed');
                }

                // It returns a blob/file download directly?
                // Or a job ID? For simplicity let's try direct stream first, 
                // but large files might need job system.
                // Re-reading plan: "New Endpoint... Handles file upload... Constructs command".
                // Let's assume direct for V1, but V2 might need async.
                // Actually, waiting for upload + convert might timeout on Vercel/Cloudflare.
                // But this is hitting our Python backend directly via Tunnel. It supports long streams.
                // So direct response blob is easiest for "Universal Media Converter".

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                // Guess filename
                const newName = selectedFile.name.split('.')[0] + '.' + selectedFormat.toLowerCase();
                a.download = newName;
                document.body.appendChild(a);
                a.click();
                a.remove();

                statusText.textContent = "Done! Downloading...";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    // Reset?
                }, 2000);

            } catch (error) {
                console.error(error);
                statusText.textContent = "Error: " + error.message;
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>

</html>
