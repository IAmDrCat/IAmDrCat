<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furry Minesweeper - IAmDrCat.com</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #0f3460);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Particles Background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #a0a0e0;
            border-radius: 50%;
            animation: float 10s infinite;
            opacity: 0.8;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .game-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
            margin: 20px auto;
        }

        h1 {
            text-align: center;
            background: linear-gradient(45deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            font-size: clamp(2rem, 6vw, 3rem);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));
            }
            to {
                filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.8));
            }
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(139, 92, 246, 0.15);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #a0a0b0;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        .btn.active {
            background: linear-gradient(45deg, #06b6d4, #8b5cf6);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }

        .game-board {
            display: inline-grid;
            gap: 2px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin: 0 auto;
            justify-content: center;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(6, 182, 212, 0.3));
            border: 2px solid rgba(139, 92, 246, 0.5);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.2s ease;
            user-select: none;
        }

        .cell:hover:not(.revealed):not(.flagged) {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.5), rgba(6, 182, 212, 0.5));
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .cell.revealed {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(139, 92, 246, 0.2);
            cursor: default;
        }

        .cell.flagged {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 140, 0, 0.3));
            border-color: #ffd700;
        }

        .cell.mine {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.5), rgba(220, 38, 38, 0.5));
            border-color: #ef4444;
        }

        .cell.mine-hit {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: explode 0.5s ease-out;
        }

        @keyframes explode {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .number-1 { color: #06b6d4; }
        .number-2 { color: #8b5cf6; }
        .number-3 { color: #10b981; }
        .number-4 { color: #f59e0b; }
        .number-5 { color: #ef4444; }
        .number-6 { color: #ec4899; }
        .number-7 { color: #6366f1; }
        .number-8 { color: #a855f7; }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.9), rgba(6, 182, 212, 0.9));
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-over-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .cell {
                width: 35px;
                height: 35px;
                font-size: 1em;
            }
            
            .game-container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .cell {
                width: 30px;
                height: 30px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="particles"></div>

    <div class="game-container">
        <h1>🐾 Furry Minesweeper 🐾</h1>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="mine-count">10</div>
                <div class="stat-label">💣 Mines Left</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="timer">0</div>
                <div class="stat-label">⏱️ Time</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="games-won">0</div>
                <div class="stat-label">🏆 Wins</div>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="btn active" onclick="game.setDifficulty('easy')">Easy (8x8)</button>
            <button class="btn" onclick="game.setDifficulty('medium')">Medium (12x12)</button>
            <button class="btn" onclick="game.setDifficulty('hard')">Hard (16x16)</button>
        </div>

        <div class="controls">
            <button class="btn" onclick="game.newGame()">🔄 New Game</button>
            <button class="btn" onclick="game.toggleFlagMode()">
                <span id="flag-mode-text">🚩 Flag Mode: OFF</span>
            </button>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <div id="game-board" class="game-board"></div>
        </div>

        <div style="text-align: center; color: #a0a0b0; font-size: 0.9em;">
            <p>Left Click: Reveal | Right Click: Flag/Unflag</p>
            <p>Or use Flag Mode button above!</p>
        </div>
    </div>

    <div class="game-over-overlay" id="game-over">
        <div class="game-over-content">
            <h2 id="game-over-title">💥 Game Over!</h2>
            <p id="game-over-message">You hit a mine!</p>
            <button class="btn" onclick="game.closeGameOver()">Play Again</button>
        </div>
    </div>

    <script>
        // Create particles
        const container = document.querySelector('.particles');
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 5 + 's';
            p.style.animationDelay = Math.random() * 20 + 's';
            container.appendChild(p);
        }

        class MinesweeperGame {
            constructor() {
                this.difficulties = {
                    easy: { rows: 8, cols: 8, mines: 10 },
                    medium: { rows: 12, cols: 12, mines: 25 },
                    hard: { rows: 16, cols: 16, mines: 50 }
                };
                
                this.currentDifficulty = 'easy';
                this.rows = 8;
                this.cols = 8;
                this.totalMines = 10;
                this.board = [];
                this.revealed = [];
                this.flagged = [];
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.timer = 0;
                this.timerInterval = null;
                this.flagMode = false;
                this.gamesWon = this.loadWins();
                
                this.boardElement = document.getElementById('game-board');
                this.mineCountElement = document.getElementById('mine-count');
                this.timerElement = document.getElementById('timer');
                this.gamesWonElement = document.getElementById('games-won');
                this.gameOverElement = document.getElementById('game-over');
                
                this.updateWinsDisplay();
                this.newGame();
            }

            setDifficulty(difficulty) {
                this.currentDifficulty = difficulty;
                const config = this.difficulties[difficulty];
                this.rows = config.rows;
                this.cols = config.cols;
                this.totalMines = config.mines;
                
                // Update active button
                document.querySelectorAll('.difficulty-selector .btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                
                this.newGame();
            }

            newGame() {
                this.board = [];
                this.revealed = [];
                this.flagged = [];
                this.gameOver = false;
                this.gameWon = false;
                this.firstClick = true;
                this.timer = 0;
                
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
                
                this.initializeBoard();
                this.renderBoard();
                this.updateMineCount();
                this.updateTimer();
            }

            initializeBoard() {
                // Create empty board
                for (let r = 0; r < this.rows; r++) {
                    this.board[r] = [];
                    this.revealed[r] = [];
                    this.flagged[r] = [];
                    for (let c = 0; c < this.cols; c++) {
                        this.board[r][c] = 0;
                        this.revealed[r][c] = false;
                        this.flagged[r][c] = false;
                    }
                }
            }

            placeMines(excludeRow, excludeCol) {
                let minesPlaced = 0;
                while (minesPlaced < this.totalMines) {
                    const r = Math.floor(Math.random() * this.rows);
                    const c = Math.floor(Math.random() * this.cols);
                    
                    // Don't place mine on first click or adjacent cells
                    if (Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1) {
                        continue;
                    }
                    
                    if (this.board[r][c] !== -1) {
                        this.board[r][c] = -1;
                        minesPlaced++;
                        
                        // Update adjacent numbers
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = r + dr;
                                const nc = c + dc;
                                if (this.isValid(nr, nc) && this.board[nr][nc] !== -1) {
                                    this.board[nr][nc]++;
                                }
                            }
                        }
                    }
                }
            }

            isValid(r, c) {
                return r >= 0 && r < this.rows && c >= 0 && c < this.cols;
            }

            renderBoard() {
                this.boardElement.innerHTML = '';
                this.boardElement.style.gridTemplateColumns = `repeat(${this.cols}, 40px)`;
                this.boardElement.style.gridTemplateRows = `repeat(${this.rows}, 40px)`;
                
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        
                        cell.addEventListener('click', (e) => this.handleClick(r, c, e));
                        cell.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            this.handleRightClick(r, c);
                        });
                        
                        this.updateCell(cell, r, c);
                        this.boardElement.appendChild(cell);
                    }
                }
            }

            updateCell(cell, r, c) {
                cell.className = 'cell';
                cell.textContent = '';
                
                if (this.flagged[r][c]) {
                    cell.classList.add('flagged');
                    cell.textContent = '🚩';
                } else if (this.revealed[r][c]) {
                    cell.classList.add('revealed');
                    
                    if (this.board[r][c] === -1) {
                        cell.textContent = '💣';
                        if (this.gameOver) {
                            cell.classList.add('mine');
                        }
                    } else if (this.board[r][c] > 0) {
                        cell.textContent = this.board[r][c];
                        cell.classList.add(`number-${this.board[r][c]}`);
                    }
                } else if (this.gameOver && this.board[r][c] === -1) {
                    cell.classList.add('mine');
                    cell.textContent = '💣';
                }
            }

            handleClick(r, c, event) {
                if (this.gameOver || this.gameWon || this.revealed[r][c]) {
                    return;
                }

                if (this.flagMode) {
                    this.handleRightClick(r, c);
                    return;
                }

                if (this.flagged[r][c]) {
                    return;
                }

                if (this.firstClick) {
                    this.placeMines(r, c);
                    this.firstClick = false;
                    this.startTimer();
                }

                if (this.board[r][c] === -1) {
                    this.revealCell(r, c);
                    this.gameOver = true;
                    const cell = event.target;
                    cell.classList.add('mine-hit');
                    this.revealAllMines();
                    setTimeout(() => this.showGameOver(false), 500);
                } else {
                    this.revealCell(r, c);
                    this.checkWin();
                }
            }

            handleRightClick(r, c) {
                if (this.gameOver || this.gameWon || this.revealed[r][c]) {
                    return;
                }

                this.flagged[r][c] = !this.flagged[r][c];
                const cell = this.boardElement.children[r * this.cols + c];
                this.updateCell(cell, r, c);
                this.updateMineCount();
            }

            revealCell(r, c) {
                if (!this.isValid(r, c) || this.revealed[r][c] || this.flagged[r][c]) {
                    return;
                }

                this.revealed[r][c] = true;
                const cell = this.boardElement.children[r * this.cols + c];
                this.updateCell(cell, r, c);

                if (this.board[r][c] === 0) {
                    // Reveal adjacent cells
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr !== 0 || dc !== 0) {
                                this.revealCell(r + dr, c + dc);
                            }
                        }
                    }
                }
            }

            revealAllMines() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.board[r][c] === -1) {
                            const cell = this.boardElement.children[r * this.cols + c];
                            this.updateCell(cell, r, c);
                        }
                    }
                }
            }

            checkWin() {
                let revealedCount = 0;
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.revealed[r][c]) {
                            revealedCount++;
                        }
                    }
                }

                if (revealedCount === this.rows * this.cols - this.totalMines) {
                    this.gameWon = true;
                    this.gamesWon++;
                    this.saveWins();
                    this.updateWinsDisplay();
                    if (this.timerInterval) {
                        clearInterval(this.timerInterval);
                    }
                    setTimeout(() => this.showGameOver(true), 300);
                }
            }

            showGameOver(won) {
                const title = document.getElementById('game-over-title');
                const message = document.getElementById('game-over-message');
                
                if (won) {
                    title.textContent = '🎉 You Win! 🎉';
                    message.textContent = `You cleared the board in ${this.timer} seconds!`;
                } else {
                    title.textContent = '💥 Game Over!';
                    message.textContent = 'You hit a mine! Better luck next time!';
                }
                
                this.gameOverElement.classList.add('show');
            }

            closeGameOver() {
                this.gameOverElement.classList.remove('show');
                this.newGame();
            }

            toggleFlagMode() {
                this.flagMode = !this.flagMode;
                const text = document.getElementById('flag-mode-text');
                const btn = text.parentElement;
                
                if (this.flagMode) {
                    text.textContent = '🚩 Flag Mode: ON';
                    btn.classList.add('active');
                } else {
                    text.textContent = '🚩 Flag Mode: OFF';
                    btn.classList.remove('active');
                }
            }

            startTimer() {
                this.timerInterval = setInterval(() => {
                    this.timer++;
                    this.updateTimer();
                }, 1000);
            }

            updateTimer() {
                this.timerElement.textContent = this.timer;
            }

            updateMineCount() {
                let flagCount = 0;
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.flagged[r][c]) {
                            flagCount++;
                        }
                    }
                }
                this.mineCountElement.textContent = this.totalMines - flagCount;
            }

            updateWinsDisplay() {
                this.gamesWonElement.textContent = this.gamesWon;
            }

            saveWins() {
                try {
                    localStorage.setItem('furryMinesweeperWins', this.gamesWon.toString());
                } catch (e) {
                    console.log('Could not save wins');
                }
            }

            loadWins() {
                try {
                    const wins = localStorage.getItem('furryMinesweeperWins');
                    return wins ? parseInt(wins) : 0;
                } catch (e) {
                    return 0;
                }
            }
        }

        // Start the game
        let game;
        window.addEventListener('load', () => {
            game = new MinesweeperGame();
        });
    </script>
</body>
</html>
