version: '3'

services:
  backend:
    build: .
    container_name: iamdrcat-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./Downloads:/app/Downloads
      # Mount cookies.txt if it exists for auth
      - ./cookies.txt:/app/cookies.txt

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: iamdrcat-tunnel
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - backend
